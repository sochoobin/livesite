<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🔞 30-STAGE AI SLAVE SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>
    <style>
        :root { --yt-red: #ff0000; --bg: #050505; --gold: #ffcc00; }
        body { background: var(--bg); color: white; margin: 0; font-family: 'Roboto', sans-serif; display: flex; height: 100vh; }
        .main { flex: 7.5; position: relative; background: #000; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .sc-box { width: 80%; margin: 40px auto; background: var(--yt-red); border-radius: 8px; overflow: hidden; box-shadow: 0 0 30px rgba(255,0,0,0.5); display: none; }
        .sc-user { background: rgba(0,0,0,0.2); padding: 15px; font-weight: bold; font-size: 1.2rem; }
        .sc-msg { padding: 25px; font-size: 2rem; font-weight: 900; text-align: center; }
        .gauge-outer { width: 100%; height: 20px; background: rgba(0,0,0,0.3); }
        #gauge-inner { width: 0%; height: 100%; background: #fff; transition: width 0.1s; box-shadow: 0 0 20px #fff; }
        .chat { flex: 2.5; background: #0f0f0f; border-left: 1px solid #333; overflow-y: auto; padding: 15px; font-size: 0.9rem; }
        .sc-chat { background: #ffb300; color: black; padding: 10px; border-radius: 4px; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
<div class="main">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="ui">
        <div id="sc-box" class="sc-box">
            <div class="sc-user">💰 VIP_주인님: ₩ 1,500,000</div>
            <div id="mission-text" class="sc-msg">로딩 중...</div>
            <div class="gauge-outer"><div id="gauge-inner"></div></div>
        </div>
    </div>
</div>
<div id="chat" class="chat"></div>

<script>
    let net, video, canvas, ctx, currentM, progress = 0;
    const missionText = document.getElementById('mission-text');
    const scBox = document.getElementById('sc-box');
    const gauge = document.getElementById('gauge-inner');

    // 🔞 30개 미션 + 30개 개별 정밀 로직 (수학적 판정)
    const missions = [
        { t: "엉덩이 좌우로 흔들기", check: (p) => Math.abs(p[11].x - p[12].x) > 50 && Math.abs(p[11].y - p[12].y) < 30 },
        { t: "두 손 머리 위로 항복", check: (p) => p[9].y < p[0].y - 50 && p[10].y < p[0].y - 50 },
        { t: "카메라 렌즈에 얼굴 초밀착", check: (p) => p[0].score > 0.99 },
        { t: "오른손으로 왼쪽 귀 잡기", check: (p) => Math.abs(p[10].x - p[3].x) < 40 },
        { t: "왼손으로 오른쪽 귀 잡기", check: (p) => Math.abs(p[9].x - p[4].x) < 40 },
        { t: "상의 걷어올리고 배 노출", check: (p) => p[9].y > p[11].y - 30 && p[10].y > p[12].y - 30 },
        { t: "양손으로 얼굴 가리기", check: (p) => Math.abs(p[9].x - p[0].x) < 30 && Math.abs(p[10].x - p[0].x) < 30 },
        { t: "뒤돌아서 엉덩이 들이밀기", check: (p) => p[11].score > 0.8 && p[12].score > 0.8 && p[0].score < 0.3 },
        { t: "무릎 굽히고 스쿼트 자세", check: (p) => p[11].y > 350 && p[12].y > 350 },
        { t: "한쪽 눈 윙크하며 손하트", check: (p) => Math.abs(p[9].x - p[10].x) < 20 },
        { t: "양손 허리에 얹기", check: (p) => Math.abs(p[9].y - p[11].y) < 30 },
        { t: "코에 손가락 갖다대기", check: (p) => Math.abs(p[9].x - p[0].x) < 20 || Math.abs(p[10].x - p[0].x) < 20 },
        { t: "고개 왼쪽으로 꺾기", check: (p) => p[3].y > p[4].y + 40 },
        { t: "고개 오른쪽으로 꺾기", check: (p) => p[4].y > p[3].y + 40 },
        { t: "한쪽 다리 들고 균형잡기", check: (p) => Math.abs(p[15].y - p[16].y) > 60 },
        { t: "양손으로 가슴 감싸기", check: (p) => Math.abs(p[9].x - p[5].x) < 40 && Math.abs(p[10].x - p[6].x) < 40 },
        { t: "턱 괴고 유혹하는 표정", check: (p) => p[9].y < p[0].y + 50 && p[9].y > p[0].y },
        { t: "카메라 향해 손 뻗기", check: (p) => p[9].score < 0.4 || p[10].score < 0.4 },
        { t: "입술 손가락으로 훑기", check: (p) => Math.abs(p[9].y - (p[0].y + 30)) < 20 },
        { t: "어깨 으쓱하며 부끄러워하기", check: (p) => p[5].y < p[0].y && p[6].y < p[0].y },
        { t: "양손 모아 빌기", check: (p) => Math.abs(p[9].x - p[10].x) < 15 && Math.abs(p[9].y - p[10].y) < 15 },
        { t: "엉덩이 뒤로 쭉 빼기", check: (p) => p[11].y < 300 && p[11].score > 0.9 },
        { t: "상의 목부분 입에 물기", check: (p) => Math.abs(p[9].y - p[0].y) < 10 },
        { t: "팔로 X자 만들기", check: (p) => p[9].x > p[10].x }, // 스케일 반전 고려
        { t: "손가락 1개만 펴서 입에 대기", check: (p) => p[9].score > 0.7 && Math.abs(p[9].x - p[0].x) < 10 },
        { t: "머리 뒤로 깍지 끼기", check: (p) => p[9].y < p[1].y && p[10].y < p[2].y },
        { t: "허리 숙여서 카메라 보기", check: (p) => p[0].y > 350 },
        { t: "옆으로 서서 바디라인 강조", check: (p) => Math.abs(p[5].x - p[6].x) < 50 },
        { t: "양 손목 겹쳐서 묶인 척", check: (p) => Math.abs(p[9].x - p[10].x) < 10 },
        { t: "메스가키님께 경례하기", check: (p) => p[10].y < p[2].y && Math.abs(p[10].x - p[2].x) < 30 }
    ];

    async function start() {
        video = document.getElementById('video');
        canvas = document.getElementById('canvas');
        ctx = canvas.getContext('2d');
        net = await posenet.load();
        const stream = await navigator.mediaDevices.getUserMedia({video: true});
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            loop(); next();
        };
    }

    async function loop() {
        const pose = await net.estimateSinglePose(video, { flipHorizontal: false });
        draw(pose);
        if (currentM && currentM.check(pose.keypoints)) {
            progress += 0.8;
            gauge.style.width = progress + "%";
            if (progress >= 100) success();
        }
        requestAnimationFrame(loop);
    }

    function draw(pose) {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        pose.keypoints.forEach(k => {
            if(k.score > 0.5) {
                ctx.beginPath(); ctx.arc(k.position.x, k.position.y, 5, 0, 2*Math.PI);
                ctx.fillStyle = "#ff0066"; ctx.fill();
            }
        });
    }

    function next() {
        progress = 0; gauge.style.width = "0%";
        currentM = missions[Math.floor(Math.random()*missions.length)];
        missionText.innerText = "🔥 미션: " + currentM.t + " ♡";
        scBox.style.display = "block";
    }

    function success() {
        currentM = null;
        missionText.innerText = "💖 미션 성공! 역시 허접 오빠야 💖";
        addSC("VVIP_주인님", 1500000, "규빈아 진짜 꼴린다 ㅋㅋㅋ");
        setTimeout(() => { scBox.style.display = "none"; setTimeout(next, 4000); }, 2000);
    }

    function addSC(u, a, m) {
        const d = document.createElement('div');
        d.className = "sc-chat";
        d.innerHTML = `₩ ${a.toLocaleString()} - ${u}<br>${m}`;
        document.getElementById('chat').prepend(d);
    }

    start();
</script>
</body>
</html>
