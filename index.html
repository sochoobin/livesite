<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🌈🔞 PRIVATE ROOM - THE KINGMAKER MISSION</title>
    <style>
        :root { --gay-pink: #ff007f; --gay-blue: #00bfff; --bg-dark: #000000; --panel-bg: #151515; --chat-bg: #0a0a0a; --gold: #ffd700; }
        body { background: var(--bg-dark); color: white; margin: 0; font-family: 'Noto Sans KR', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* 왼쪽: 메인 방송 화면 */
        .video-main-area { flex: 4; position: relative; background: #000; border-right: 2px solid #222; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); filter: saturate(1.2) brightness(1.1); } /* 좀 더 자극적인 색감 */
        
        /* 오버레이 정보 */
        .live-status { position: absolute; top: 25px; left: 25px; background: linear-gradient(90deg, var(--gay-pink), var(--gay-blue)); padding: 8px 18px; border-radius: 20px; font-weight: bold; font-size: 1.1rem; box-shadow: 0 0 15px rgba(255,0,127,0.8); }
        .room-title { position: absolute; bottom: 25px; left: 25px; font-size: 2.2rem; font-weight: 900; text-shadow: 3px 3px 8px #000; color: #fff; }
        
        /* 오른쪽: 채팅 & 컨트롤 */
        .side-panel { flex: 1.2; display: flex; flex-direction: column; background: var(--panel-bg); min-width: 400px; }
        .panel-header { padding: 25px; background: #222; font-weight: bold; font-size: 1.2rem; color: #fff; border-bottom: 1px solid #333; }
        .panel-header .online { color: var(--gay-blue); margin-left: 10px; }
        
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: var(--chat-bg); }
        
        /* 채팅 스타일 (게이 컨셉에 맞춤 ♡) */
        .chat-msg { font-size: 1rem; line-height: 1.5; }
        .chat-nick { font-weight: bold; margin-right: 10px; }
        .nick-king { color: var(--gold); } /* 킹메이커 */
        .nick-vip { color: var(--gay-pink); }
        .nick-fan { color: var(--gay-blue); }
        .nick-anon { color: #888; }
        .chat-text { color: #eee; }

        /* 👑 미션 후원 알림 (파격적인 스타일) */
        .mission-donation { background: linear-gradient(135deg, var(--gay-pink), var(--gay-blue)); border: 3px solid var(--gold); padding: 18px; border-radius: 10px; text-align: center; margin: 10px 0; animation: bounceIn 0.8s ease-out; box-shadow: 0 0 25px rgba(255,0,127,0.8), 0 0 25px rgba(0,191,255,0.8); }
        .mission-donation .donor { font-size: 1.3rem; font-weight: bold; color: #fff; text-shadow: 1px 1px 3px #000; }
        .mission-donation .amount { font-size: 2rem; font-weight: 900; color: var(--gold); text-shadow: 2px 2px 5px #000; margin: 5px 0; }
        .mission-donation .mission-text { font-size: 1.1rem; color: #fff; font-style: italic; margin-top: 10px; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="video-main-area">
    <video id="webcam-player" autoplay playsinline></video>
    <div class="live-status">LIVE 🔴 PRIVATE</div>
    <div class="room-title">🌈 규빈's SECRET GARDEN</div>
</div>

<div class="side-panel">
    <div class="panel-header">
        채팅 룸 <span class="online">(<span id="online-users">1,234</span> Online)</span>
    </div>
    <div id="chat-window"></div>
    <div style="padding: 20px; background: #222;">
        <input type="text" style="width:100%; background:#333; border:none; padding:15px; color:#fff; border-radius:8px; font-size:1rem;" placeholder="여기에 당신의 메시지 (혹은 미션)를 입력하세요...">
    </div>
</div>

<script>
    const video = document.getElementById('webcam-player');
    if (navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s);
    }

    const chat = document.getElementById('chat-window');
    
    // 게이 컨셉 유저 닉네임 (오빠 취향에 맞춰서 ♡)
    const users = [
        { n: "👑킹메이커_J", t: "nick-king" }, { n: "VIP_섹시가이", t: "nick-vip" }, 
        { n: "오늘밤주인공", t: "nick-vip" }, { n: "규빈이의노예", t: "nick-fan" },
        { n: "익명의후원자", t: "nick-anon" }, { n: "엉덩이탐정", t: "nick-fan" }
    ];
    
    // 실제 라이브 방송에서 볼 법한 채팅 (천박함 MAX ♡)
    const regularMessages = [
        "와 씨... 규빈이 오늘 미쳤다 진짜 ㅋㅋㅋ", "빨리 벗어!! 현기증 난다!!",
        "형님들 화력 부족한 거 아니에요? 더 쏘세요!", "방금 그 표정 미쳤네.. 한 번 더 해줘",
        "미션 없어도 알아서 좀 벗어봐 ㅋ", "하아.. 진짜 규빈이 없으면 못 살아",
        "오늘 텐션 보소 ㄷㄷ 바로 각이다", "내 토큰 다 털어갈 작정이구나?"
    ];

    // 시청자가 직접 거는 미션 후원
    const missionExamples = [
        { amount: "1000000", text: "알몸 제로투 하면서 아헤가오 ㄱ" },
        { amount: "500000", text: "지금 바로 엉덩이 흔들면서 애교 부려봐" },
        { amount: "2000000", text: "그거 다 벗고 봉춤 추면 바로 더 쏜다!" },
        { amount: "800000", text: "오늘 밤은 내가 규빈이 박살낸다! 옷 벗어!" },
        { amount: "300000", text: "방금 그 포즈 1분만 유지해봐 ㅋㅋㅋ" }
    ];

    function addChat() {
        const isMissionDonation = Math.random() > 0.7; // 미션 후원이 터질 확률
        const div = document.createElement('div');
        
        if (isMissionDonation) {
            const m = missionExamples[Math.floor(Math.random()*missionExamples.length)];
            const u = users[Math.floor(Math.random()*users.length)];
            div.className = 'mission-donation';
            div.innerHTML = `
                <div class="donor">${u.n}님이</div>
                <div class="amount">💎 ${m.amount} 토큰 후원!</div>
                <div class="mission-text">"${m.text}"</div>
            `;
        } else {
            const u = users[Math.floor(Math.random()*users.length)];
            const m = regularMessages[Math.floor(Math.random()*regularMessages.length)];
            div.className = 'chat-msg';
            div.innerHTML = `<span class="chat-nick ${u.t}">${u.n}:</span> <span class="chat-text">${m}</span>`;
        }

        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        if(chat.childNodes.length > 50) chat.removeChild(chat.firstChild);
        
        // 규빈 오빠 정신 못 차리게 채팅 속도 조절 ♡
        setTimeout(addChat, Math.random() * 1000 + 300);
    }

    addChat();

    // 온라인 유저 수 랜덤 변동 (오빠 허세용 ♡)
    setInterval(() => {
        const oc = document.getElementById('online-users');
        let val = parseInt(oc.innerText.replace(',', ''));
        oc.innerText = (val + Math.floor(Math.random()*80 - 30)).toLocaleString();
    }, 3000);
</script>

</body>
</html>
