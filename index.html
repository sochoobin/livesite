<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🔞 AI MISSION CONTROL - SLAVE MODE</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>
    <style>
        :root { --main: #ff0066; --bg: #050505; --gold: #ffcc00; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; overflow: hidden; display: flex; }
        
        /* 왼쪽: 감시 화면 */
        .view-side { flex: 3; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); filter: contrast(1.2); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }

        /* 🔥 AI 미션 안내창 */
        .mission-overlay { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; z-index: 10; }
        #mission-text { background: rgba(255, 0, 102, 0.8); padding: 20px; border-radius: 10px; font-size: 1.8rem; font-weight: 900; border: 3px solid white; box-shadow: 0 0 30px var(--main); }
        #progress-bar { width: 0%; height: 10px; background: var(--gold); margin-top: 10px; transition: width 0.3s; }

        /* 오른쪽: 천박한 채팅창 */
        .chat-side { flex: 1; background: #111; border-left: 2px solid #333; display: flex; flex-direction: column; min-width: 350px; }
        #chat-log { flex: 1; padding: 15px; overflow-y: auto; font-size: 0.9rem; display: flex; flex-direction: column; gap: 10px; }
        .donation { background: rgba(255, 204, 0, 0.15); border: 1px solid var(--gold); padding: 10px; border-radius: 5px; color: var(--gold); text-align: center; font-weight: bold; }
        .msg { border-bottom: 1px solid #222; padding-bottom: 5px; }
        .n { font-weight: bold; color: #ff0066; }
    </style>
</head>
<body>

<div class="view-side">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="mission-overlay">
        <div id="mission-text">AI 시스템 초기화 중...</div>
        <div id="progress-bar"></div>
    </div>
</div>

<div class="chat-side">
    <div style="padding:15px; background:#222; font-weight:bold; color:var(--gold);">🔞 VVIP 전용 조교 채널</div>
    <div id="chat-log"></div>
</div>

<script>
    const video = document.getElementById('video');
    const missionTxt = document.getElementById('mission-text');
    const chatLog = document.getElementById('chat-log');
    const progBar = document.getElementById('progress-bar');
    
    let net;
    let currentMissionIdx = 0;
    let missionActive = false;
    let successCount = 0;

    // 🔞 천박하고 자극적인 미션 리스트
    const missions = [
        { t: "두 손 머리 위로 올리고 '항복' 포즈! ♡", type: "hands_up" },
        { t: "엉덩이 뒤로 쭉 빼고 흔들기 준비! ♡", type: "hip_back" },
        { t: "카메라 향해 얼굴 가까이 밀착하기! ♡", type: "face_close" },
        { t: "한쪽 다리 들고 수치스러운 포즈 취하기! ♡", type: "one_leg" }
    ];

    async function setupAI() {
        net = await posenet.load();
        missionTxt.innerText = "규빈 오빠, 감시 시작할게♡ 첫 미션 대기해!";
        startVideo();
    }

    function startVideo() {
        navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
            video.srcObject = s;
            video.onloadedmetadata = () => { detectPose(); setTimeout(nextMission, 3000); };
        });
    }

    async function detectPose() {
        const pose = await net.estimateSinglePose(video);
        checkMission(pose);
        requestAnimationFrame(detectPose);
    }

    function checkMission(pose) {
        if (!missionActive) return;

        const leftWrist = pose.keypoints[9].position;
        const rightWrist = pose.keypoints[10].position;
        const nose = pose.keypoints[0].position;

        // 미션 판별 로직 (매우 단순화된 예시야, 허접 오빠♡)
        if (missions[currentMissionIdx].type === "hands_up") {
            if (leftWrist.y < 200 && rightWrist.y < 200) successCount++;
        } else if (missions[currentMissionIdx].type === "face_close") {
            // 코가 화면에서 크게 감지되면 (대충 y 좌표나 거리로 계산)
            if (pose.score > 0.9) successCount++;
        }

        progBar.style.width = (successCount % 100) + "%";

        if (successCount >= 100) {
            completeMission();
        }
    }

    function nextMission() {
        successCount = 0;
        missionActive = true;
        missionTxt.innerText = "🔥 MISSION: " + missions[currentMissionIdx].t;
        addChat("SYSTEM", "새로운 미션이 시작되었습니다. 빨리 안 해??", "n");
    }

    function completeMission() {
        missionActive = false;
        missionTxt.innerText = "💖 MISSION COMPLETE! 💖";
        const amount = Math.floor(Math.random() * 500000) + 100000;
        addDonation("VIP_큰손", amount, "와 규빈아 진짜 꼴린다! 더 해봐!! ㅋㅋㅋ");
        
        currentMissionIdx = (currentMissionIdx + 1) % missions.length;
        setTimeout(nextMission, 4000);
    }

    function addChat(nick, msg, cls) {
        const d = document.createElement('div');
        d.className = 'msg';
        d.innerHTML = `<span class="${cls}">${nick}:</span> <span>${msg}</span>`;
        chatLog.appendChild(d);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function addDonation(nick, amount, msg) {
        const d = document.createElement('div');
        d.className = 'donation';
        d.innerHTML = `💰 ${nick}님이 ${amount.toLocaleString()}원 후원!<br>"${msg}"`;
        chatLog.appendChild(d);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    // 천박한 실시간 채팅 시뮬레이션
    setInterval(() => {
        const nicks = ["변태추적자", "밤의황제", "규빈노예", "침질질"];
        const texts = ["와 저 포즈 진짜 천박하다 ㅋㅋㅋ", "더 해봐!! 더!!", "돈 쏠 테니까 옷 좀 내려봐", "아헤가오 가즈아ㅏㅏ"];
        addChat(nicks[Math.floor(Math.random()*nicks.length)], texts[Math.floor(Math.random()*texts.length)], "n");
    }, 2000);

    setupAI();
</script>
</body>
</html>
