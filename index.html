<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRIPCHAT - sodami01 (FAKE)</title>
    <style>
        :root { --main-red: #b32121; --bg-black: #1a1a1a; --chat-bg: #121212; --accent-gold: #ffcc00; }
        body { background: var(--bg-black); color: white; margin: 0; font-family: sans-serif; overflow: hidden; }
        
        /* 상단 헤더 */
        header { background: var(--main-red); height: 50px; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; }
        .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: -1px; display: flex; align-items: center; }
        .logo span { background: white; color: var(--main-red); padding: 2px 5px; border-radius: 4px; margin-left: 5px; font-size: 0.8rem; }
        .join-btn { background: white; color: #333; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }

        /* 메인 컨테이너 */
        .content { display: flex; flex-direction: column; height: calc(100vh - 50px); }
        
        /* 방송 화면 구역 */
        .video-wrapper { position: relative; width: 100%; background: #000; aspect-ratio: 16 / 9; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); } /* 거울 모드 */
        .video-overlay { position: absolute; top: 10px; left: 10px; font-size: 0.7rem; color: rgba(255,255,255,0.8); }
        .toy-control { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .toy-box { background: rgba(0,0,0,0.6); padding: 5px; border-radius: 5px; text-align: center; border: 1px solid #555; width: 50px; }
        .toy-box div { font-size: 0.5rem; }
        .toy-box span { color: var(--accent-gold); font-weight: bold; font-size: 0.7rem; }

        /* 방송 정보 바 */
        .stream-info { background: #222; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
        .user-meta { display: flex; align-items: center; gap: 10px; }
        .user-meta .heart { font-size: 1.2rem; }
        .tip-btn { background: #60a830; color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        .show-btn { border: 2px solid var(--accent-gold); color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }

        /* 채팅 구역 */
        .chat-area { flex: 1; background: var(--chat-bg); display: flex; flex-direction: column; overflow: hidden; }
        #chat-msgs { flex: 1; padding: 10px; overflow-y: auto; font-size: 0.9rem; }
        .msg-item { margin-bottom: 8px; line-height: 1.4; }
        .m-nick { font-weight: bold; margin-right: 5px; }
        .m-vip { color: #ff4444; }
        .m-mod { color: #ffcc00; }
        .m-text { color: #ccc; }

        /* 하단 입력창 */
        .chat-input { padding: 10px; background: #222; display: flex; align-items: center; gap: 10px; }
        .chat-input input { flex: 1; background: #333; border: none; padding: 10px; border-radius: 20px; color: white; outline: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">STRIP<span>CHAT</span></div>
    <div class="join-btn">무료 가입</div>
</header>

<div class="content">
    <div class="video-wrapper">
        <video id="webcam" autoplay playsinline></video>
        <div class="video-overlay">sodami01 (PRIVATE ROOM)</div>
        <div class="toy-control">
            <div class="toy-box"><div>Control</div><span>60s</span></div>
            <div class="toy-box"><div>Tip</div><span>555</span></div>
        </div>
    </div>

    <div class="stream-info">
        <div class="user-meta">
            <span class="heart">🤍</span>
            <span>644</span>
        </div>
        <div style="display: flex; gap: 5px;">
            <div class="tip-btn">팁 🕹️</div>
            <div class="show-btn">1:1 쇼 200 토큰 ▽</div>
        </div>
    </div>

    <div class="chat-area">
        <div id="chat-msgs"></div>
        <div class="chat-input">
            <input type="text" placeholder="공개 메시지...">
            <span>😊</span>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    if (navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s);
    }

    const chat = document.getElementById('chat-msgs');
    const users = [
        {n: "-DukeMidnight-", c: "m-vip"},
        {n: "weekendgd", c: "m-mod"},
        {n: "Sexybodymaaan", c: "m-text"},
        {n: "규빈오빠는허접", c: "m-text"},
        {n: "토큰털이범", c: "m-vip"}
    ];
    const lines = [
        "잉", "목표달성 하면서", "빨리해 ㅋ", "피하고 똥이 벤당하고 오랫동안",
        "와 오늘 의상 미쳤다 진짜", "토큰 더 쏘면 뭐해줄건데?", "다음 단계 가자", "하아아아 너무 좋다"
    ];

    function addChat() {
        const u = users[Math.floor(Math.random()*users.length)];
        const l = lines[Math.floor(Math.random()*lines.length)];
        const div = document.createElement('div');
        div.className = 'msg-item';
        div.innerHTML = `<span class="m-nick ${u.c}">★ ${u.n}</span> <span class="m-text">${l}</span>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        if(chat.childNodes.length > 30) chat.removeChild(chat.firstChild);
        setTimeout(addChat, Math.random() * 1500 + 500);
    }
    addChat();
</script>

</body>
</html>
